<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ParkEase – Smart Parking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #191919;
      --bg2:      #212121;
      --bg3:      #2a2a2a;
      --bg4:      #323232;
      --line:     rgba(255,255,255,0.08);
      --line2:    rgba(255,255,255,0.14);
      --white:    #ffffff;
      --off:      #a8a8a8;
      --muted:    #6b6b6b;
      --accent:   #ffffff;
      --green:    #4ade80;
      --red:      #f87171;
      --yellow:   #fbbf24;
      --blue:     #60a5fa;
      --dim-g:    rgba(74,222,128,0.12);
      --dim-r:    rgba(248,113,113,0.1);
      --dim-y:    rgba(251,191,36,0.15);
      --dim-b:    rgba(96,165,250,0.12);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    #navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 3rem;
      border-bottom: 1px solid var(--line);
      background: rgba(25,25,25,0.92);
      backdrop-filter: blur(16px);
    }

    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-monogram { width: 32px; height: 32px; border: 1px solid var(--line2); display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.02em; color: var(--white); }
    .nav-name { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--white); }
    .nav-links { display: flex; gap: 2.5rem; }
    .nav-link { color: var(--off); text-decoration: none; font-size: 0.9rem; transition: color 0.3s; cursor: pointer; }
    .nav-link:hover { color: var(--white); }
    .nav-link.active { color: var(--blue); }

    .user-section { display: flex; align-items: center; gap: 1.5rem; }
    .user-name { font-size: 0.85rem; color: var(--off); }
    .logout-btn {
      padding: 0.5rem 1rem;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      color: var(--red);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.3s;
    }
    .logout-btn:hover { background: rgba(248,113,113,0.2); }

    #mainContent { position: relative; z-index: 1; margin-top: 60px; }
    .section { padding: 4rem 3rem; display: none; }
    .section.active { display: block; animation: fadeIn 0.5s ease; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .section-title { font-size: 2.5rem; font-weight: 700; margin-bottom: 3rem; }

    /* ──── SLOT GRID ──── */
    .slot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .slot {
      aspect-ratio: 1;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.75rem;
      border: 2px solid transparent;
      transition: all 0.3s;
    }

    .slot.available { background: var(--dim-g); color: var(--green); border-color: var(--green); }
    .slot.available:hover { transform: scale(1.1); box-shadow: 0 4px 12px rgba(74,222,128,0.2); }
    .slot.booked { background: var(--dim-r); color: var(--red); border-color: var(--red); opacity: 0.6; cursor: not-allowed; }
    .slot.selected { background: var(--yellow); color: var(--bg); border-color: var(--yellow); }

    /* ──── FILTERS ──── */
    .filter-group { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .filter-btn {
      padding: 0.6rem 1.2rem;
      background: var(--bg3);
      border: 1px solid var(--line);
      color: var(--off);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.9rem;
    }
    .filter-btn.active {
      background: var(--blue);
      color: var(--bg);
      border-color: var(--blue);
    }

    /* ──── MODAL ──── */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal.active { display: flex; }

    .modal-content {
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-header { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; }
    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      color: var(--off);
      font-size: 1.5rem;
      cursor: pointer;
      transition: color 0.3s;
    }
    .modal-close:hover { color: var(--white); }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    input, select {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg3);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--white);
      font-size: 1rem;
      font-family: inherit;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(96,165,250,0.1);
    }

    .btn-group { display: flex; gap: 1rem; margin-top: 2rem; }
    .btn { flex: 1; padding: 0.75rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .btn-primary { background: var(--blue); color: var(--bg); }
    .btn-primary:hover { background: #3b82f6; }
    .btn-secondary { background: var(--bg3); color: var(--off); border: 1px solid var(--line); }
    .btn-secondary:hover { background: var(--bg4); color: var(--white); }

    .booking-card {
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .card-label { font-size: 0.85rem; color: var(--off); }
    .card-value { font-size: 1.1rem; font-weight: 700; }

    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
    }

    .stat-value { font-size: 2rem; font-weight: 700; color: var(--blue); margin-bottom: 0.5rem; }
    .stat-label { font-size: 0.9rem; color: var(--off); }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--bg3);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 0.5rem;
    }

    .progress-fill { height: 100%; background: var(--green); border-radius: 3px; }

    .table-container { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      padding: 1rem;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid var(--line);
      font-size: 0.85rem;
      color: var(--off);
      text-transform: uppercase;
    }

    td {
      padding: 1rem;
      border-bottom: 1px solid var(--line2);
      font-size: 0.9rem;
    }

    tr:hover { background: rgba(255,255,255,0.02); }

    .status-badge {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-active { background: var(--dim-g); color: var(--green); }
    .status-completed { background: var(--dim-b); color: var(--blue); }
    .status-cancelled { background: var(--dim-r); color: var(--red); }

    .message {
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }

    .message.show { display: block; animation: slideDown 0.3s ease; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.success {
      background: var(--dim-g);
      color: var(--green);
      border: 1px solid rgba(74,222,128,0.3);
    }

    .message.error {
      background: var(--dim-r);
      color: var(--red);
      border: 1px solid rgba(248,113,113,0.3);
    }

    @media (max-width: 768px) {
      #navbar { padding: 0 1.5rem; }
      .section { padding: 2rem 1.5rem; }
      .slot-grid { grid-template-columns: repeat(auto-fit, minmax(50px, 1fr)); gap: 0.5rem; }
      .nav-links { gap: 1rem; }
      .filter-group { gap: 0.5rem; }
    }
  </style>
</head>
<body>
  <!-- ─── NAVBAR ─── -->
  <nav id="navbar">
    <a href="#" class="nav-logo">
      <div class="nav-monogram">🅿️</div>
      <span class="nav-name">ParkEase</span>
    </a>
    <div class="nav-links">
      <span class="nav-link active" onclick="switchSection('booking')">Book Slot</span>
      <span class="nav-link" onclick="switchSection('myBooking')">My Booking</span>
      <span class="nav-link" onclick="switchSection('dashboard')">Dashboard</span>
      <span class="nav-link" onclick="switchSection('profile')">Profile</span>
    </div>
    <div class="user-section">
      <span class="user-name" id="userNameDisplay">User</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <!-- ─── MAIN CONTENT ─── -->
  <div id="mainContent">
    <!-- BOOKING SECTION -->
    <div id="booking" class="section active">
      <h2 class="section-title">Book a Parking Slot</h2>

      <div id="bookingMessage" class="message"></div>

      <div class="filter-group">
        <select id="floorFilter" class="filter-btn" onchange="loadSlots()">
          <option value="">All Floors</option>
          <option value="Ground Floor">Ground Floor</option>
          <option value="First Floor">First Floor</option>
        </select>
        <select id="zoneFilter" class="filter-btn" onchange="loadSlots()">
          <option value="">All Zones</option>
          <option value="A">Zone A</option>
          <option value="B">Zone B</option>
          <option value="C">Zone C</option>
          <option value="D">Zone D</option>
        </select>
      </div>

      <div id="slotsContainer" class="slot-grid"></div>
    </div>

    <!-- MY BOOKING SECTION -->
    <div id="myBooking" class="section">
      <h2 class="section-title">My Current Booking</h2>

      <div id="myBookingMessage" class="message"></div>

      <div id="bookingDetailsContainer"></div>

      <h2 class="section-title" style="margin-top: 3rem;">Booking History</h2>
      <div id="bookingHistoryContainer" class="table-container">
        <table>
          <thead>
            <tr>
              <th>Slot</th>
              <th>Vehicle</th>
              <th>Booking Time</th>
              <th>Duration</th>
              <th>Cost</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="bookingTable">
            <tr><td colspan="6" style="text-align: center; color: var(--off);">No bookings yet</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- DASHBOARD SECTION -->
    <div id="dashboard" class="section">
      <h2 class="section-title">Parking Dashboard</h2>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-value" id="totalSlots">0</div>
          <div class="stat-label">Total Slots</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="availableSlots">0</div>
          <div class="stat-label">Available</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="bookedSlots">0</div>
          <div class="stat-label">Booked</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="occupancyRate">0%</div>
          <div class="stat-label">Occupancy Rate</div>
        </div>
      </div>

      <h3 style="margin-bottom: 1.5rem; margin-top: 2rem;">Occupancy by Floor</h3>
      <div id="floorStatsContainer"></div>
    </div>

    <!-- PROFILE SECTION -->
    <div id="profile" class="section">
      <h2 class="section-title">My Profile</h2>

      <div id="profileMessage" class="message"></div>

      <div class="booking-card">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="profileFullName" readonly />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="profileEmail" readonly />
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="profilePhone" />
        </div>
        <div class="form-group">
          <label>Vehicle Type</label>
          <select id="profileVehicleType">
            <option value="car">Car</option>
            <option value="motorcycle">Motorcycle</option>
            <option value="suv">SUV</option>
            <option value="truck">Truck</option>
          </select>
        </div>
        <div class="form-group">
          <label>Vehicle Number</label>
          <input type="text" id="profileVehicleNumber" placeholder="ABC-1234" />
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="updateProfile()">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <!-- BOOKING MODAL -->
  <div id="bookingModal" class="modal">
    <div class="modal-content" style="position: relative;">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-header">Book Slot</div>

      <form id="bookingForm">
        <div class="form-group">
          <label>Slot ID</label>
          <input type="text" id="slotIdInput" readonly />
        </div>
        <div class="form-group">
          <label>Floor</label>
          <input type="text" id="floorInput" readonly />
        </div>
        <div class="form-group">
          <label>Zone</label>
          <input type="text" id="zoneInput" readonly />
        </div>
        <div class="form-group">
          <label>Vehicle Number</label>
          <input type="text" id="vehicleNumberInput" placeholder="ABC-1234" required />
        </div>
        <div class="form-group">
          <label>Vehicle Type</label>
          <select id="vehicleTypeInput" required>
            <option value="car">Car</option>
            <option value="motorcycle">Motorcycle</option>
            <option value="suv">SUV</option>
            <option value="truck">Truck</option>
          </select>
        </div>
        <div class="form-group">
          <label>Notes (Optional)</label>
          <input type="text" id="notesInput" placeholder="Any special notes..." />
        </div>
        <div class="btn-group">
          <button type="submit" class="btn btn-primary">Confirm Booking</button>
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:5000/api';
    let allSlots = [];
    let currentBooking = null;
    let user = null;

    // ──── UTILITY FUNCTIONS ──── 
    function getToken() {
      return localStorage.getItem('token');
    }

    function getHeaders() {
      return {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${getToken()}`,
      };
    }

    function showMessage(message, type, elementId = 'bookingMessage') {
      const element = document.getElementById(elementId);
      element.textContent = message;
      element.className = `message show ${type}`;
      setTimeout(() => element.classList.remove('show'), 3000);
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }

    function switchSection(sectionId) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(sectionId).classList.add('active');
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
      event.target.classList.add('active');

      if (sectionId === 'dashboard') loadStats();
      if (sectionId === 'myBooking') loadMyBookings();
      if (sectionId === 'booking') loadSlots();
    }

    // ──── SLOT BOOKING ────
    async function loadSlots() {
      try {
        const floor = document.getElementById('floorFilter').value;
        const zone = document.getElementById('zoneFilter').value;

        let url = `${API_URL}/booking/slots`;
        const params = [];
        if (floor) params.push(`floor=${floor}`);
        if (zone) params.push(`zone=${zone}`);
        if (params.length) url += '?' + params.join('&');

        const response = await fetch(url, { headers: getHeaders() });
        const data = await response.json();

        if (data.success) {
          allSlots = data.slots;
          renderSlots();
        }
      } catch (error) {
        console.error('Error loading slots:', error);
        showMessage('Failed to load slots', 'error');
      }
    }

    function renderSlots() {
      const container = document.getElementById('slotsContainer');
      container.innerHTML = allSlots.map(slot => `
        <div class="slot ${slot.isAvailable ? 'available' : 'booked'}"
             onclick="${slot.isAvailable ? `selectSlot('${slot.slotId}', '${slot.floor}', '${slot.zone}')` : ''}">
          ${slot.slotId}
        </div>
      `).join('');
    }

    function selectSlot(slotId, floor, zone) {
      document.getElementById('slotIdInput').value = slotId;
      document.getElementById('floorInput').value = floor;
      document.getElementById('zoneInput').value = zone;
      const modal = document.getElementById('bookingModal');
      modal.classList.add('active');
    }

    function closeModal() {
      document.getElementById('bookingModal').classList.remove('active');
      document.getElementById('bookingForm').reset();
    }

    document.getElementById('bookingForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();

      const slotId = document.getElementById('slotIdInput').value;
      const vehicleNumber = document.getElementById('vehicleNumberInput').value;
      const vehicleType = document.getElementById('vehicleTypeInput').value;
      const notes = document.getElementById('notesInput').value;

      try {
        const response = await fetch(`${API_URL}/booking/book`, {
          method: 'POST',
          headers: getHeaders(),
          body: JSON.stringify({ slotId, vehicleNumber, vehicleType, notes }),
        });

        const data = await response.json();

        if (data.success) {
          showMessage('Slot booked successfully!', 'success', 'bookingMessage');
          closeModal();
          loadSlots();
          loadMyBookings();
        } else {
          showMessage(data.message || 'Booking failed', 'error', 'bookingMessage');
        }
      } catch (error) {
        console.error('Error booking slot:', error);
        showMessage('Booking failed', 'error', 'bookingMessage');
      }
    });

    // ──── MY BOOKINGS ────
    async function loadMyBookings() {
      try {
        // Load current booking
        const currentResponse = await fetch(`${API_URL}/booking/current-booking`, {
          headers: getHeaders(),
        });

        const currentData = await currentResponse.json();

        if (currentData.success && currentData.booking) {
          currentBooking = currentData.booking;
          renderCurrentBooking();
        } else {
          document.getElementById('bookingDetailsContainer').innerHTML = '<p style="color: var(--off);">No active booking</p>';
        }

        // Load booking history
        const historyResponse = await fetch(`${API_URL}/booking/my-bookings`, {
          headers: getHeaders(),
        });

        const historyData = await historyResponse.json();

        if (historyData.success) {
          renderBookingHistory(historyData.bookings);
        }
      } catch (error) {
        console.error('Error loading bookings:', error);
      }
    }

    function renderCurrentBooking() {
      const html = `
        <div class="booking-card">
          <div class="card-header">
            <div>
              <div class="card-label">Slot</div>
              <div class="card-value">${currentBooking.slotId}</div>
            </div>
            <div>
              <div class="card-label">Floor</div>
              <div class="card-value">${currentBooking.floor}</div>
            </div>
            <div>
              <div class="card-label">Zone</div>
              <div class="card-value">${currentBooking.zone}</div>
            </div>
          </div>
          <div style="padding-top: 1rem; border-top: 1px solid var(--line);">
            <div class="card-label">Vehicle: <span class="card-value">${currentBooking.vehicleNumber}</span></div>
            <div class="card-label" style="margin-top: 0.5rem;">Booking Time: <span class="card-value">${new Date(currentBooking.bookingTime).toLocaleString()}</span></div>
          </div>
          <div class="btn-group" style="margin-top: 1rem;">
            <button class="btn btn-primary" onclick="completeBooking('${currentBooking._id}')">Complete & Leave</button>
            <button class="btn btn-secondary" onclick="cancelBooking('${currentBooking._id}')">Cancel Booking</button>
          </div>
        </div>
      `;
      document.getElementById('bookingDetailsContainer').innerHTML = html;
    }

    function renderBookingHistory(bookings) {
      const tbody = document.getElementById('bookingTable');
      if (bookings.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--off);">No bookings yet</td></tr>';
        return;
      }

      tbody.innerHTML = bookings.map(b => `
        <tr>
          <td>${b.slotId}</td>
          <td>${b.vehicleNumber}</td>
          <td>${new Date(b.bookingTime).toLocaleString()}</td>
          <td>${b.duration ? b.duration + ' min' : '-'}</td>
          <td>${b.cost ? '₹' + b.cost : '-'}</td>
          <td><span class="status-badge status-${b.status}">${b.status}</span></td>
        </tr>
      `).join('');
    }

    async function completeBooking(bookingId) {
      if (!confirm('Complete booking and leave?')) return;

      try {
        const response = await fetch(`${API_URL}/booking/complete`, {
          method: 'POST',
          headers: getHeaders(),
          body: JSON.stringify({ bookingId }),
        });

        const data = await response.json();

        if (data.success) {
          showMessage('Booking completed! Thank you for using ParkEase.', 'success', 'myBookingMessage');
          loadMyBookings();
          loadSlots();
        } else {
          showMessage(data.message || 'Failed to complete booking', 'error', 'myBookingMessage');
        }
      } catch (error) {
        console.error('Error completing booking:', error);
        showMessage('Error completing booking', 'error', 'myBookingMessage');
      }
    }

    async function cancelBooking(bookingId) {
      if (!confirm('Cancel booking?')) return;

      try {
        const response = await fetch(`${API_URL}/booking/cancel`, {
          method: 'POST',
          headers: getHeaders(),
          body: JSON.stringify({ bookingId }),
        });

        const data = await response.json();

        if (data.success) {
          showMessage('Booking cancelled', 'success', 'myBookingMessage');
          loadMyBookings();
          loadSlots();
        } else {
          showMessage(data.message || 'Failed to cancel booking', 'error', 'myBookingMessage');
        }
      } catch (error) {
        console.error('Error cancelling booking:', error);
        showMessage('Error cancelling booking', 'error', 'myBookingMessage');
      }
    }

    // ──── DASHBOARD ────
    async function loadStats() {
      try {
        const response = await fetch(`${API_URL}/booking/stats`, {
          headers: getHeaders(),
        });

        const data = await response.json();

        if (data.success) {
          const stats = data.stats;
          document.getElementById('totalSlots').textContent = stats.totalSlots;
          document.getElementById('availableSlots').textContent = stats.availableSlots;
          document.getElementById('bookedSlots').textContent = stats.bookedSlots;
          document.getElementById('occupancyRate').textContent = stats.occupancyRate + '%';

          renderFloorStats(stats.slotsByFloor);
        }
      } catch (error) {
        console.error('Error loading stats:', error);
      }
    }

    function renderFloorStats(floors) {
      const container = document.getElementById('floorStatsContainer');
      container.innerHTML = floors.map(floor => {
        const percentage = ((floor.booked / floor.total) * 100).toFixed(0);
        return `
          <div class="booking-card">
            <div class="card-header">
              <div>
                <div class="card-label">${floor._id}</div>
                <div class="card-value">${floor.available} / ${floor.total} available</div>
              </div>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${percentage}%"></div>
            </div>
            <div style="font-size: 0.85rem; color: var(--off); margin-top: 0.5rem;">
              ${percentage}% occupied
            </div>
          </div>
        `;
      }).join('');
    }

    // ──── PROFILE ────
    async function loadProfile() {
      try {
        const response = await fetch(`${API_URL}/auth/profile`, {
          headers: getHeaders(),
        });

        const data = await response.json();

        if (data.success) {
          user = data.user;
          document.getElementById('userNameDisplay').textContent = user.fullName;
          document.getElementById('profileFullName').value = user.fullName;
          document.getElementById('profileEmail').value = user.email;
          document.getElementById('profilePhone').value = user.phone;
          document.getElementById('profileVehicleType').value = user.vehicleType;
          document.getElementById('profileVehicleNumber').value = user.vehicleNumber || '';
        }
      } catch (error) {
        console.error('Error loading profile:', error);
      }
    }

    async function updateProfile() {
      const phone = document.getElementById('profilePhone').value;
      const vehicleType = document.getElementById('profileVehicleType').value;
      const vehicleNumber = document.getElementById('profileVehicleNumber').value;

      try {
        const response = await fetch(`${API_URL}/auth/profile`, {
          method: 'PUT',
          headers: getHeaders(),
          body: JSON.stringify({ phone, vehicleType, vehicleNumber }),
        });

        const data = await response.json();

        if (data.success) {
          showMessage('Profile updated successfully', 'success', 'profileMessage');
          loadProfile();
        } else {
          showMessage(data.message || 'Failed to update profile', 'error', 'profileMessage');
        }
      } catch (error) {
        console.error('Error updating profile:', error);
        showMessage('Error updating profile', 'error', 'profileMessage');
      }
    }

    // ──── INITIALIZATION ────
    function init() {
      const token = getToken();
      if (!token) {
        window.location.href = 'login.html';
        return;
      }

      loadProfile();
      loadSlots();
    }

    init();
  </script>
</body>
</html>
