<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - ParkEase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #191919;
      --bg2: #212121;
      --bg3: #2a2a2a;
      --bg4: #323232;
      --line: rgba(255, 255, 255, 0.08);
      --line2: rgba(255, 255, 255, 0.14);
      --white: #ffffff;
      --off: #a8a8a8;
      --muted: #6b6b6b;
      --accent: #ffffff;
      --green: #4ade80;
      --red: #f87171;
      --yellow: #fbbf24;
      --blue: #60a5fa;
      --dim-g: rgba(74, 222, 128, 0.12);
      --dim-r: rgba(248, 113, 113, 0.1);
      --dim-y: rgba(251, 191, 36, 0.15);
      --dim-b: rgba(96, 165, 250, 0.12);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 450px;
      padding: 2rem;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 2.5rem;
      backdrop-filter: blur(10px);
    }

    .logo-section {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo {
      width: 48px;
      height: 48px;
      background: var(--blue);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 auto 1rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--off);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: var(--white);
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg3);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--white);
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--blue);
      background: var(--bg4);
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
    }

    input::placeholder {
      color: var(--muted);
    }

    .error {
      color: var(--red);
      font-size: 0.85rem;
      margin-top: 0.4rem;
      display: none;
    }

    .error.show {
      display: block;
    }

    .submit-btn {
      width: 100%;
      padding: 0.85rem;
      background: var(--blue);
      border: none;
      border-radius: 8px;
      color: var(--bg);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 1rem;
    }

    .submit-btn:hover {
      background: #3b82f6;
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(96, 165, 250, 0.3);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 1.5rem 0;
      gap: 1rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .divider-text {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .toggle-link {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--off);
      font-size: 0.95rem;
    }

    .toggle-link a {
      color: var(--blue);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.3s ease;
    }

    .toggle-link a:hover {
      color: #3b82f6;
    }

    .message {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: var(--dim-g);
      color: var(--green);
      border: 1px solid rgba(74, 222, 128, 0.3);
    }

    .message.error {
      background: var(--dim-r);
      color: var(--red);
      border: 1px solid rgba(248, 113, 113, 0.3);
    }

    .loading {
      display: inline-block;
      width: 4px;
      height: 4px;
      background: currentColor;
      border-radius: 50%;
      animation: dots 1.4s infinite;
    }

    @keyframes dots {
      0%, 60%, 100% { opacity: 0.3; }
      30% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo-section">
        <div class="logo">🅿️</div>
        <h1>ParkEase</h1>
        <p class="subtitle">Smart Parking Made Easy</p>
      </div>

      <div id="messageBox" class="message"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
          />
          <div class="error" id="emailError"></div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
          />
          <div class="error" id="passwordError"></div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          Sign In
        </button>
      </form>

      <div class="divider">
        <span class="divider-text">Don't have an account?</span>
      </div>

      <div class="toggle-link">
        <span>Create a new account<br></span>
        <a href="register.html">Sign Up Here</a>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:5000/api';

    const loginForm = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageBox = document.getElementById('messageBox');

    function showMessage(text, type) {
      messageBox.textContent = text;
      messageBox.className = `message show ${type}`;
      setTimeout(() => messageBox.classList.remove('show'), 4000);
    }

    function clearErrors() {
      document.querySelectorAll('.error').forEach(el => el.classList.remove('show'));
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showMessage('Please fill in all fields', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing In...';

      try {
        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          showMessage('Login successful! Redirecting...', 'success');
          setTimeout(() => (window.location.href = 'app.html'), 1500);
        } else {
          showMessage(data.message || 'Login failed', 'error');
        }
      } catch (error) {
        showMessage('Network error. Please try again.', 'error');
        console.error(error);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });

    // Check if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = 'app.html';
    }
  </script>
</body>
</html>
