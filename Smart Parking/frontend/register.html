<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - ParkEase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #191919;
      --bg2: #212121;
      --bg3: #2a2a2a;
      --bg4: #323232;
      --line: rgba(255, 255, 255, 0.08);
      --line2: rgba(255, 255, 255, 0.14);
      --white: #ffffff;
      --off: #a8a8a8;
      --muted: #6b6b6b;
      --accent: #ffffff;
      --green: #4ade80;
      --red: #f87171;
      --yellow: #fbbf24;
      --blue: #60a5fa;
      --dim-g: rgba(74, 222, 128, 0.12);
      --dim-r: rgba(248, 113, 113, 0.1);
      --dim-y: rgba(251, 191, 36, 0.15);
      --dim-b: rgba(96, 165, 250, 0.12);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      padding: 1rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 450px;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 2.5rem;
      backdrop-filter: blur(10px);
    }

    .logo-section {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo {
      width: 48px;
      height: 48px;
      background: var(--green);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 auto 1rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--off);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: var(--white);
    }

    input, select {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg3);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--white);
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--green);
      background: var(--bg4);
      box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.1);
    }

    select {
      cursor: pointer;
    }

    input::placeholder {
      color: var(--muted);
    }

    .error {
      color: var(--red);
      font-size: 0.85rem;
      margin-top: 0.4rem;
      display: none;
    }

    .error.show {
      display: block;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-row .form-group {
      margin-bottom: 1rem;
    }

    .submit-btn {
      width: 100%;
      padding: 0.85rem;
      background: var(--green);
      border: none;
      border-radius: 8px;
      color: var(--bg);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 1rem;
    }

    .submit-btn:hover {
      background: #22c55e;
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(74, 222, 128, 0.3);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .toggle-link {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--off);
      font-size: 0.95rem;
    }

    .toggle-link a {
      color: var(--green);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.3s ease;
    }

    .toggle-link a:hover {
      color: #22c55e;
    }

    .message {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: var(--dim-g);
      color: var(--green);
      border: 1px solid rgba(74, 222, 128, 0.3);
    }

    .message.error {
      background: var(--dim-r);
      color: var(--red);
      border: 1px solid rgba(248, 113, 113, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo-section">
        <div class="logo">🅿️</div>
        <h1>Join ParkEase</h1>
        <p class="subtitle">Create your account to get started</p>
      </div>

      <div id="messageBox" class="message"></div>

      <form id="registerForm">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input
            type="text"
            id="fullName"
            name="fullName"
            placeholder="John Doe"
            required
          />
          <div class="error" id="fullNameError"></div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
          />
          <div class="error" id="emailError"></div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input
              type="tel"
              id="phone"
              name="phone"
              placeholder="+91 9876543210"
              required
            />
            <div class="error" id="phoneError"></div>
          </div>

          <div class="form-group">
            <label for="vehicleType">Vehicle Type</label>
            <select id="vehicleType" name="vehicleType">
              <option value="car">Car</option>
              <option value="motorcycle">Motorcycle</option>
              <option value="suv">SUV</option>
              <option value="truck">Truck</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="vehicleNumber">Vehicle Number (Optional)</label>
          <input
            type="text"
            id="vehicleNumber"
            name="vehicleNumber"
            placeholder="ABC-1234"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
          />
          <div class="error" id="passwordError"></div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          Create Account
        </button>
      </form>

      <div class="toggle-link">
        <span>Already have an account?<br></span>
        <a href="login.html">Sign In Here</a>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:5000/api';

    const registerForm = document.getElementById('registerForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageBox = document.getElementById('messageBox');

    function showMessage(text, type) {
      messageBox.textContent = text;
      messageBox.className = `message show ${type}`;
      setTimeout(() => messageBox.classList.remove('show'), 4000);
    }

    function clearErrors() {
      document.querySelectorAll('.error').forEach(el => el.classList.remove('show'));
    }

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const fullName = document.getElementById('fullName').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const password = document.getElementById('password').value;
      const vehicleType = document.getElementById('vehicleType').value;
      const vehicleNumber = document.getElementById('vehicleNumber').value;

      if (!fullName || !email || !phone || !password) {
        showMessage('Please fill in all required fields', 'error');
        return;
      }

      if (password.length < 6) {
        document.getElementById('passwordError').textContent = 'Password must be at least 6 characters';
        document.getElementById('passwordError').classList.add('show');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating Account...';

      try {
        const response = await fetch(`${API_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            fullName,
            email,
            phone,
            password,
            vehicleType,
            vehicleNumber,
          }),
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          showMessage('Account created successfully! Redirecting...', 'success');
          setTimeout(() => (window.location.href = 'app.html'), 1500);
        } else {
          showMessage(data.message || 'Registration failed', 'error');
        }
      } catch (error) {
        showMessage('Network error. Please try again.', 'error');
        console.error(error);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }
    });

    // Check if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = 'app.html';
    }
  </script>
</body>
</html>
